<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tabi — We Are Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Pacifico&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --green: #2c4d3d;
      --lime: #d8f95e;
      --cream: #f4f1e8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--green);
      color: var(--cream);
      font-family: 'Baloo 2', sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* ---------- Logo ---------- */
    .logo {
      position: absolute;
      top: clamp(28px, 4.5vh, 64px);
      left: clamp(28px, 5.5vw, 100px);
      font-family: 'Pacifico', cursive;
      font-size: clamp(28px, 2.6vw, 42px);
      color: #fff;
      line-height: 1;
      z-index: 3;
    }

    /* ---------- Content ---------- */
    .content {
      position: relative;
      z-index: 2;
      padding: 0 clamp(28px, 5.5vw, 100px);
      max-width: 900px;
    }

    h1 {
      font-weight: 800;
      font-size: clamp(40px, 6.4vw, 104px);
      line-height: 1.04;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: clamp(18px, 3vh, 34px);
    }

    .subtitle {
      font-weight: 700;
      font-size: clamp(16px, 1.5vw, 23px);
      line-height: 1.5;
      color: #fff;
    }

    /* ---------- Blob ---------- */
    .blob-wrap {
      position: absolute;
      z-index: 1;
      bottom: -45%;
      right: -15%;
      width: 56vw;
      max-width: 980px;
      height: 53.2vw;
      max-height: 931px;
      pointer-events: none;
    }

    .blob-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .blob-wrap path,
    .blob-wrap circle {
      fill: var(--lime);
    }

    /* ---------- Mobile / narrow layout ---------- */
    @media (max-width: 720px) {
      .page {
        align-items: center;
        flex-direction: column;
        padding-top: clamp(60px, 11vh, 110px);
      }

      .logo {
        position: static;
        margin: 0 0 clamp(14px, 3vh, 24px);
      }

      .content {
        max-width: 100%;
        padding: 0 28px;
        text-align: center;
        margin: 0 auto;
      }

      h1 {
        font-size: clamp(34px, 9.5vw, 46px);
        margin-bottom: 16px;
      }

      .subtitle {
        font-size: clamp(15px, 4vw, 18px);
      }

      .blob-wrap {
        width: 135vw;
        height: 128.3vw;
        right: -45vw;
        bottom: -31%;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 8.5vw;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="logo">tabi</div>

    <div class="content">
      <h1>We Are<br>Coming Soon</h1>
      <p class="subtitle">Beautiful by Nature .<br>Kind to skin.</p>
    </div>

    <div class="blob-wrap" aria-hidden="true">
      <svg viewBox="0 0 1000 950" xmlns="http://www.w3.org/2000/svg">
        <circle cx="220" cy="390" r="165" />
        <circle cx="425" cy="265" r="190" />
        <circle cx="650" cy="235" r="205" />
        <circle cx="305" cy="565" r="190" />
        <circle cx="565" cy="555" r="215" />
        <circle cx="755" cy="475" r="225" />
        <circle cx="630" cy="705" r="225" />
        <circle cx="395" cy="725" r="185" />
        <circle cx="160" cy="590" r="155" />
      </svg>
    </div>

  </div>

</body>

</html>
